<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fútbol App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>⚽ FutbolApp</h1>

  <div id="userBox">
    <span id="userEmail"></span>
    <button onclick="logout()">Salir</button>
  </div>

  <button id="loginBtn" onclick="toggleLogin()">Login</button>
</header>

<div id="authBox" class="auth-modal hidden">
  <div class="auth-container">
    <h2>Bienvenido 👋</h2>
    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Crear cuenta</button>
  </div>
</div>

<!-- LOGIN -->
<div id="authBox" class="auth-container">
  <h2>Bienvenido 👋</h2>
  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Crear cuenta</button>
  <p id="msg"></p>
</div>

<!-- APP -->
<main id="appContent">

  <!-- FILTROS -->
  <div class="filters">
    <button onclick="setFilter('all')" id="f_all" class="active">ALL</button>
    <button onclick="setFilter('live')" id="f_live">LIVE NOW</button>
    <button onclick="setFilter('today')" id="f_today">TODAY</button>
  </div>

  <!-- PARTIDOS -->
  <section id="matches"></section>

</main>

<script src="app.js"></script>


<div id="matchModal" class="modal">
  <div class="modal-content">

    <span class="close" onclick="closeModal()">✖</span>

    <div id="matchDetail"></div>

  </div>
</div>

</body>
</html>
