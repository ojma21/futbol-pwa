<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fútbol App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<header class="header">
  <h1>⚽ FutbolApp</h1>

  <div id="userBox" style="display:none;">
    <span id="userEmail"></span>
    <button onclick="logout()">Salir</button>
  </div>

  <button id="loginBtn" onclick="toggleLogin()">Login</button>
</header>

<!-- LOGIN -->
<div id="authBox" class="auth-modal hidden">
  <div class="auth-container">
    <span class="close-modal" onclick="toggleLogin()">✖</span>
    <h2>Bienvenido 👋</h2>
    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Crear cuenta</button>
  </div>
</div>

<!-- APP -->
<main id="appContent">

  <!-- 🏠 HOME -->
  <section id="screen_home" class="screen active"></section>

  <!-- ⚽ MATCHES (TODO TU SISTEMA ORIGINAL) -->
  <section id="screen_matches" class="screen">

    <div class="filters">
      <button onclick="setFilter('all')" id="f_all" class="active">ALL</button>
      <button onclick="setFilter('live')" id="f_live">🔴 LIVE</button>
      <button onclick="setFilter('today')" id="f_today">📅 TODAY</button>
      <button onclick="setFilter('laliga')">🇪🇸 La Liga</button>
    </div>

    <h2 id="matchesTitle">Partidos</h2>
    <section id="matches"></section>

    <div class="league-tabs" id="leagueTabs"></div>
    <div id="leagueContent"></div>

  </section>

  <!-- 👤 PROFILE -->
  <section id="screen_profile" class="screen"></section>

</main>

<!-- MODAL (NO TOCADO) -->
<div id="matchModal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()">✖</span>
    <div id="matchDetail"></div>
  </div>
</div>

<script src="app.js"></script>

<nav class="bottom-nav">
  <button onclick="goTab('home')" id="tab_home">🏠</button>
  <button onclick="goTab('favorites')" id="tab_fav">⭐</button>
  <button onclick="goTab('leagues')" id="tab_leagues">🏆</button>
  <button onclick="goTab('profile')" id="tab_profile">👤</button>
</nav>

</body>
</html>
