<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fútbol App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<header class="header">
  <h1>⚽ FutbolApp</h1>

  <div id="userBox" style="display:none;">
    <span id="userEmail"></span>
    <button onclick="logout()">Salir</button>
  </div>

  <button id="loginBtn" onclick="toggleLogin()">Login</button>
</header>

<!-- LOGIN MODAL -->
<div id="authBox" class="auth-modal hidden">
  <div class="auth-container">

    <span class="close-modal" onclick="toggleLogin()">✖</span>

    <h2>Bienvenido 👋</h2>

    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>
    <button onclick="register()">Crear cuenta</button>

    <p id="msg"></p>

  </div>
</div>

<!-- APP -->
<main id="appContent">

  <!-- FILTROS -->
  <div class="filters">
    <button onclick="setFilter('all')" id="f_all" class="active">ALL</button>
    <button onclick="setFilter('live')" id="f_live">LIVE NOW</button>
    <button onclick="setFilter('today')" id="f_today">TODAY</button>
  </div>

  <!-- LIGAS (PESTAÑAS) -->
  <div class="league-tabs" id="leagueTabs"></div>

  <div id="leagueContent"></div>

  <!-- PARTIDOS -->
  <section id="matches"></section>

</main>

<!-- MODAL PARTIDO -->
<div id="matchModal" class="modal">
  <div class="modal-content">

    <span class="close-modal" onclick="closeModal()">✖</span>

    <div id="matchDetail"></div>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
