<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fútbol App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<header class="header">
  <h1>⚽ FutbolApp</h1>

  <div id="userBox" style="display:none;">
    <span id="userEmail"></span>
    <button onclick="logout()">Salir</button>
  </div>

  <button id="loginBtn" onclick="toggleLogin()">Login</button>
</header>

<!-- LOGIN -->
<div id="authBox" class="auth-modal hidden">
  <div class="auth-container">
    <span class="close-modal" onclick="toggleLogin()">✖</span>
    <h2>Bienvenido 👋</h2>
    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Crear cuenta</button>
  </div>
</div>

<!-- APP -->
<main id="appContent">

  <!-- 🏠 HOME -->
  <section id="screen_home" class="screen active"></section>

  <!-- ⚽ MATCHES (TODO TU SISTEMA ORIGINAL) -->
  <section id="screen_matches" class="screen">

    <div class="filters">
      <button onclick="setFilter('all')" id="f_all" class="active">ALL</button>
      <button onclick="setFilter('live')" id="f_live">🔴 LIVE</button>
      <button onclick="setFilter('today')" id="f_today">📅 TODAY</button>
      <button onclick="setFilter('laliga')">🇪🇸 La Liga</button>
    </div>

    <h2 id="matchesTitle">Partidos</h2>
    <section id="matches"></section>

    <div class="league-tabs" id="leagueTabs"></div>
    <div id="leagueContent"></div>

  </section>

  <!-- 👤 PROFILE -->
  <section id="screen_profile" class="screen"></section>

</main>

<!-- MODAL (NO TOCADO) -->
<div id="matchModal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()">✖</span>
    <div id="matchDetail"></div>
  </div>
</div>

<script src="app.js"></script>

<nav class="bottom-nav">

  <div onclick="goTab('home')" class="nav-item active">
    <svg viewBox="0 0 24 24">
      <path d="M3 10L12 3l9 7v10a1 1 0 0 1-1 1h-6v-6H10v6H4a1 1 0 0 1-1-1z"/>
    </svg>
    <small>Inicio</small>
  </div>

  <div onclick="goTab('favorites')" class="nav-item">
    <svg viewBox="0 0 24 24">
      <path d="M12 17.3l-5.5 3 1-5.8L3 9.8l5.8-.8L12 3.5l2.2 5.5 5.8.8-4.2 4.7 1 5.8z"/>
    </svg>
    <small>Favoritos</small>
  </div>

  <div onclick="goTab('leagues')" class="nav-item">
    <svg viewBox="0 0 24 24">
      <path d="M12 2l3 7h7l-5.5 4 2 7-6.5-4-6.5 4 2-7L2 9h7z"/>
    </svg>
    <small>Ligas</small>
  </div>

  <div onclick="goTab('profile')" class="nav-item">
    <svg viewBox="0 0 24 24">
      <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
    </svg>
    <small>Perfil</small>
  </div>

</nav>

</body>
</html>
