<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fútbol App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>⚽ FutbolApp</h1>
  <div id="userBox" style="display:none;">
    <span id="userEmail"></span>
    <button onclick="logout()">Salir</button>
  </div>
</header>

<!-- LOGIN -->
<div id="authBox" class="auth-container">
  <h2>Bienvenido 👋</h2>
  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Crear cuenta</button>
  <p id="msg"></p>
</div>

<!-- APP -->
<main id="appContent" style="display:none;">

  <nav class="tabs">
    <button onclick="showTab('live')">En vivo</button>
    <button onclick="showTab('today')">Hoy</button>
    <button onclick="showTab('table')">Tabla</button>
    <button onclick="showTab('fav')">⭐</button>
  </nav>

  <section id="live" class="tab active">
    <div id="liveMatches"></div>
  </section>

  <section id="today" class="tab">
    <div id="todayMatches"></div>
  </section>

  <section id="table" class="tab">
    <select id="leagueSelect" onchange="loadStandings()">
      <option value="140">La Liga</option>
      <option value="39">Premier League</option>
    </select>

    <table class="table">
      <thead>
        <tr>
          <th>Equipo</th>
          <th>Pts</th>
          <th>GF</th>
          <th>GC</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </section>

  <section id="fav" class="tab">
    <h2>Favoritos</h2>
    <div id="favorites"></div>
  </section>

</main>

<script src="app.js"></script>


<div id="matchModal" class="modal">
  <div class="modal-content">

    <span class="close" onclick="closeModal()">✖</span>

    <div id="matchDetail"></div>

  </div>
</div>

</body>
</html>
